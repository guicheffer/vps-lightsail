name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts are executable
        run: |
          for f in setup.sh teardown.sh swap-ip.sh fetch-config.sh provision.sh; do
            test -x "$f" && echo "✅ $f" || (echo "❌ $f not executable" && exit 1)
          done

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get install -y shellcheck -qq
          shellcheck setup.sh teardown.sh swap-ip.sh fetch-config.sh provision.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
